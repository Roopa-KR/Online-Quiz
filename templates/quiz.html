<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>Exam</h1>

<div class="container">

<form method="POST">

{% for q in questions %}
    <div class="card">
        <p><b>{{ q[2] }}</b></p>

        <input type="radio" name="{{ q[0] }}" value="1"> {{ q[3] }}<br>
        <input type="radio" name="{{ q[0] }}" value="2"> {{ q[4] }}<br>
        <input type="radio" name="{{ q[0] }}" value="3"> {{ q[5] }}<br>
        <input type="radio" name="{{ q[0] }}" value="4"> {{ q[6] }}<br>
    </div>
{% endfor %}

<button type="submit">Submit Exam</button>

</form>

</div>

</body>
</html>
