{% extends "base.html" %}

{% block title %}{{ exam_name }}{% endblock %}

{% block content %}
<h1>{{ exam_name }}</h1>
<p class="subtle">Answer every question carefully. Each correct answer is worth 1 mark.</p>

<div class="container">

<form method="POST">

{% for q in questions %}
    <div class="card">
        <div class="quiz-head">
            <span class="question-index">Question {{ loop.index }}</span>
            <h3>{{ q[2] }}</h3>
        </div>

        <div class="option-list">
            <label class="option">
                <input type="radio" name="{{ q[0] }}" value="1" required>
                <span>{{ q[3] }}</span>
            </label>
            <label class="option">
                <input type="radio" name="{{ q[0] }}" value="2">
                <span>{{ q[4] }}</span>
            </label>
            <label class="option">
                <input type="radio" name="{{ q[0] }}" value="3">
                <span>{{ q[5] }}</span>
            </label>
            <label class="option">
                <input type="radio" name="{{ q[0] }}" value="4">
                <span>{{ q[6] }}</span>
            </label>
        </div>
    </div>
{% endfor %}

<button type="submit">Submit Exam</button>

</form>

</div>
{% endblock %}
