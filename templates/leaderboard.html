<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v='3') }}">
</head>

<body>

<h1>Leaderboard</h1>
<p class="subtle">Top scores across all completed exams.</p>

<div class="container wide">

    <table>
        <tr>
            <th>User</th>
            <th>Total Score</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/dashboard"><button>Back</button></a>

</div>

</body>
</html>
