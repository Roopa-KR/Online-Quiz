<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Welcome {{ session.get('user') }}</h2>
    <h3>Role: {{ role }}</h3>

    <hr>

    <!-- ADMIN FEATURES -->
    {% if role == 'admin' %}
        <div>
            <a href="{{ url_for('create_exam_page') }}">
                <button>Create Exam</button>
            </a>

            <a href="{{ url_for('add_question_page') }}">
                <button>Add Question</button>
            </a>

            <a href="{{ url_for('delete_user_page') }}">
                <button>Delete User</button>
            </a>
        </div>

        <hr>
    {% endif %}

    <!-- COMMON FEATURES -->
    <div>
        <a href="{{ url_for('start_exam') }}">
            <button>Start Exam</button>
        </a>
    </div>

    <br>

    <!-- LOGOUT -->
    <div>
        <a href="{{ url_for('logout') }}">
            <button>Logout</button>
        </a>
    </div>
</div>

</body>
</html>
