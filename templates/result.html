{% extends "base.html" %}

{% block title %}{{ exam_name }} Result{% endblock %}

{% block content %}
<div class="page-intro">
    <h1 class="page-title">{{ exam_name }} Result</h1>
    <p class="subtle page-subtitle">Your final score is shown below.</p>
</div>

<div class="container narrow">

    <h2>Your Score</h2>

    <p class="meta">Total questions: {{ total }}</p>

    <p class="highlight-score">
        {{ score }} / {{ total }}
    </p>

    <a href="/dashboard" class="btn-link">Go to Dashboard</a>

</div>
{% endblock %}
