{% extends "base.html" %}

{% block title %}{{ exam_name }} Result{% endblock %}

{% block content %}
<h1>{{ exam_name }} Result</h1>
<p class="subtle">Your final score is shown below.</p>

<div class="container">

    <h2>Your Score</h2>

    <p class="meta">Total questions: {{ total }}</p>

    <p style="font-size: 20px; color: var(--text); font-weight: 700;">
        {{ score }} / {{ total }}
    </p>

    <a href="/dashboard"><button>Go to Dashboard</button></a>

</div>
{% endblock %}
