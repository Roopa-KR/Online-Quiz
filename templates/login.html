<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v='3') }}">
</head>

<body class="login-page">
    <main class="login-shell">
        <section class="login-brand">
            <h1>Examination Management System</h1>
            <p class="subtle">Sign in to manage exams, create tests, and take quizzes from a single dashboard.</p>
        </section>

        <section class="container login-card" aria-label="Login form">
            <h2>Login</h2>

            {% if error_message %}
            <div class="form-error" role="alert">{{ error_message }}</div>
            {% endif %}

            <form method="POST" class="login-form">
                <input type="text" name="username" placeholder="Enter Username" autocomplete="username" required value="{{ username or '' }}">
                <input type="password" name="password" placeholder="Enter Password" autocomplete="current-password" required>
                <button type="submit">Login</button>
            </form>

            <a href="/register" class="btn-secondary">Register</a>
        </section>
    </main>
</body>
</html>
