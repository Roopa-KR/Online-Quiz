<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v='3') }}">
</head>

<body class="register-page">
<main class="standalone-shell">
    <section class="login-brand">
        <h1>Create Account</h1>
        <p class="subtle">Register as an admin or student to access exam management and quiz workflows.</p>
    </section>

    <section class="container standalone-card">
        <h2>Register</h2>

        <form method="POST">
            <input type="text" name="username" placeholder="Username" autocomplete="username" required>
            <input type="password" name="password" placeholder="Password" autocomplete="new-password" required>

            <select name="role">
                <option value="admin">Admin</option>
                <option value="student">Student</option>
            </select>

            <button type="submit">Register</button>
        </form>

        <a href="/" class="btn-link secondary">Back to Login</a>
    </section>
</main>
</body>
</html>
