{% extends "base.html" %}

{% block title %}Delete User{% endblock %}

{% block content %}
<h1>Delete User</h1>
<p class="subtle">Remove an account permanently from the system.</p>

<div class="container">
    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <button type="submit">Delete</button>
    </form>

    <a href="/dashboard"><button type="button">Back</button></a>
</div>
{% endblock %}
