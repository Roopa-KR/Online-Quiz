{% extends "base.html" %}

{% block title %}Create Exam{% endblock %}

{% block content %}
<div class="page-intro">
    <h1 class="page-title">Create Exam</h1>
    <p class="subtle page-subtitle">Create a 10-mark exam, then add ten one-mark questions for it.</p>
</div>

<div class="container narrow">
    <form method="POST">
        <input type="text" name="name" placeholder="Exam Name" required>
        
        <input type="number" name="marks" placeholder="Total Marks" required>
        
        <button type="submit">Create Exam</button>
    </form>

    <a href="/dashboard" class="btn-link secondary">Back</a>
</div>
{% endblock %}
