{% extends "base.html" %}

{% block title %}Create Exam{% endblock %}

{% block content %}
<h1>Create Exam</h1>
<p class="subtle">Create a 10-mark exam, then add ten one-mark questions for it.</p>

<div class="container">
    <form method="POST">
        <input type="text" name="name" placeholder="Exam Name" required>
        
        <input type="number" name="marks" placeholder="Total Marks" required>
        
        <button type="submit">Create Exam</button>
    </form>

    <a href="/dashboard"><button>Back</button></a>
</div>
{% endblock %}
