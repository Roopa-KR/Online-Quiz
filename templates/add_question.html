{% extends "base.html" %}

{% block title %}Add Question{% endblock %}

{% block content %}
<h1>Add Question</h1>
<p class="subtle">Add a question to the selected exam using a clear four-option layout.</p>

<div class="container">
    <form method="POST">
        <input type="text" name="question" placeholder="Question" required>

        <input type="text" name="option1" placeholder="Option 1" required>
        <input type="text" name="option2" placeholder="Option 2" required>
        <input type="text" name="option3" placeholder="Option 3" required>
        <input type="text" name="option4" placeholder="Option 4" required>

        <input type="number" name="correct" min="1" max="4" placeholder="Correct Option (1-4)" required>

        <button type="submit">Add Question</button>
    </form>

    <a href="/dashboard"><button type="button">Back</button></a>
</div>
{% endblock %}
